# Clarvis — contributor quickstart
# NOT for production (production runs systemd-native)
#
# Try it:
#   docker compose run clarvis                        # run demo
#   docker compose run clarvis clarvis brain health   # brain health check
#   docker compose run clarvis pytest -m "not slow"   # run tests
#
# Interactive shell:
#   docker compose run clarvis bash

services:
  clarvis:
    build: .
    volumes:
      # Persist brain data between runs
      - clarvis-data:/app/data
    environment:
      - CLARVIS_WORKSPACE=/app
      - CLARVIS_GRAPH_BACKEND=sqlite
    stdin_open: true
    tty: true

volumes:
  clarvis-data:
