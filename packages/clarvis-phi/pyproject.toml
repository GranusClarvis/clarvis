[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "clarvis-phi"
version = "1.0.0"
description = "IIT-inspired Phi metric: measure information integration across graph-partitioned knowledge systems"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = ["integrated-information-theory", "iit", "phi", "consciousness", "graph-integration", "cognitive-architecture"]

[project.scripts]
clarvis-phi = "clarvis_phi.__main__:main"
