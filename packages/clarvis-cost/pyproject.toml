[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "clarvis-cost"
version = "1.0.0"
description = "Token optimization and cost tracking for LLM-powered cognitive systems"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = ["token-optimization", "cost-tracking", "llm", "api-usage", "budget-monitoring"]

[project.scripts]
clarvis-cost = "clarvis_cost.__main__:main"
