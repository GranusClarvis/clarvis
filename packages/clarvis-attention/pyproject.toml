[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "clarvis-attention"
version = "1.0.0"
description = "GWT attention spotlight: capacity-limited workspace with salience competition, decay, and broadcast hooks"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = [
    "global-workspace-theory", "gwt", "attention", "spotlight",
    "cognitive-architecture", "consciousness", "salience",
]

[project.scripts]
clarvis-attention = "clarvis_attention.__main__:main"
