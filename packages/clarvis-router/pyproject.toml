[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "clarvis-router"
version = "1.0.0"
description = "Smart model routing: 14-dimension prompt scorer selects the optimal LLM for each task. OpenRouter compatible."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = ["llm-routing", "model-selection", "openrouter", "cost-optimization", "prompt-classification"]

[project.optional-dependencies]
openrouter = ["httpx>=0.25.0"]

[project.scripts]
clarvis-router = "clarvis_router.__main__:main"
