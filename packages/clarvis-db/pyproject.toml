[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "clarvis-db"
version = "1.0.0"
description = "Local vector memory with Hebbian learning, STDP synapses, ChromaDB + ONNX embeddings"
requires-python = ">=3.10"
license = "MIT"
keywords = ["vector-memory", "hebbian", "stdp", "chromadb", "onnx", "cognitive-architecture"]

[project.optional-dependencies]
chroma = ["chromadb>=0.4.0"]
onnx = ["onnxruntime>=1.15.0"]
all = ["chromadb>=0.4.0", "onnxruntime>=1.15.0"]

[project.scripts]
clarvis-db = "clarvis_db.__main__:main"
