[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "clarvis-reasoning"
version = "1.0.0"
description = "Meta-cognitive reasoning quality assessment — step checking, coherence, calibration"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["metacognition", "reasoning", "quality-assessment", "cognitive-architecture", "brier-score"]

[project.scripts]
clarvis-reasoning = "clarvis_reasoning.__main__:main"
