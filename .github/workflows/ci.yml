name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (critical errors)
        run: ruff check clarvis/ packages/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/clarvis-cost
          pip install -e packages/clarvis-reasoning
          pip install -e packages/clarvis-db
          pip install -e ".[all]"

      - name: Basic import check
        run: python3 -c "from clarvis.brain import brain; print('brain import OK')"
        env:
          CLARVIS_WORKSPACE: ${{ github.workspace }}

      - name: Verify wheel builds (all 4 packages)
        run: |
          pip install build
          python -m build packages/clarvis-cost --outdir /tmp/dist
          python -m build packages/clarvis-reasoning --outdir /tmp/dist
          python -m build packages/clarvis-db --outdir /tmp/dist
          python -m build . --outdir /tmp/dist

      - name: Run full test suite
        run: python3 -m pytest packages/ tests/ -v --tb=short -m "not slow"
        env:
          CLARVIS_WORKSPACE: ${{ github.workspace }}

  docker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t clarvis:ci-${{ github.sha }} .

      - name: Smoke test — CLI loads
        run: docker run --rm clarvis:ci-${{ github.sha }} clarvis --help

      - name: Smoke test — brain import
        run: docker run --rm clarvis:ci-${{ github.sha }} python3 -c "from clarvis.brain import brain; print('brain import OK')"

      - name: Smoke test — pytest (fast)
        run: docker run --rm clarvis:ci-${{ github.sha }} python3 -m pytest packages/ tests/ -x -q -m "not slow"
