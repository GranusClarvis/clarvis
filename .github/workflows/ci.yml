name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (critical errors)
        run: ruff check clarvis/ packages/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/clarvis-cost
          pip install -e packages/clarvis-reasoning
          pip install -e packages/clarvis-db
          pip install -e ".[all]"

      - name: Basic import check
        run: python3 -c "from clarvis.brain import brain; print('brain import OK')"
        env:
          CLARVIS_WORKSPACE: ${{ github.workspace }}

      - name: Run full test suite
        run: python3 -m pytest packages/ tests/ -v --tb=short -m "not slow"
        env:
          CLARVIS_WORKSPACE: ${{ github.workspace }}
