name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest chromadb onnxruntime typer
          pip install -e packages/clarvis-db
          pip install -e packages/clarvis-cost
          pip install -e packages/clarvis-reasoning
          pip install -e .

      - name: Basic import check
        run: python3 -c "from clarvis.brain import brain; print('brain import OK')"
        env:
          CLARVIS_WORKSPACE: ${{ github.workspace }}

      - name: Run clarvis-db tests
        run: python3 -m pytest packages/clarvis-db/tests/ -v

      - name: Run clarvis spine tests
        run: python3 -m pytest clarvis/tests/ -v
        env:
          CLARVIS_WORKSPACE: ${{ github.workspace }}

      - name: Run open-source smoke tests
        run: python3 -m pytest tests/test_open_source_smoke.py -v
        env:
          CLARVIS_WORKSPACE: ${{ github.workspace }}
